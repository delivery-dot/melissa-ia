DICTIONNAIRE UMB — Base de connaissances officielle :

FUNNELS & OFFRES :
Tunnel de vente (Funnel) : parcours structure qui guide une personne inconnue jusqu'a l'achat, etape par etape. Chaque page a un role precis. La pub amene du trafic a l'entree du tunnel.
Lead magnet : contenu gratuit offert en echange d'un email ou telephone (PDF, video, template). Objectif : convaincre la personne de laisser ses coordonnees.
Page d'optin / Landing page / Page de capture : page ou arrive le prospect apres avoir clique sur la pub. Contient le lead magnet et un formulaire. C'est ici qu'on mesure le CPL.
Opt-in : action de laisser ses infos sur la page de capture. Quand quelqu'un opte, il devient un lead.
Lead / Prospect / Inscrit : personne qui a laisse ses coordonnees, interessee mais pas encore cliente. Entre le lead et la vente : webinaire, appel ou sequence email.
Webinaire / Masterclass / Conference live : presentation en direct pour eduquer et pitcher une offre. Format de vente le plus courant pour les offres a partir de 500 euros.
Webinaire evergreen : webinaire pre-enregistre et automatise, diffuse en continu. Meme mecanique que le live mais sans intervention en direct.
VSL (Video Sales Letter) : video de vente integree dans un tunnel. Presente l'offre, explique sa valeur, casse les objections. Courante en e-commerce et infopreneuriat low/middle ticket.
Challenge : evenement en ligne sur plusieurs jours (3 a 5), pour engager une audience et creer de la confiance avant de presenter une offre.
Low ticket : offre vendue a moins de 100 euros, sans appel de vente. Conversion en ligne directe.
Middle ticket : offre entre 100 et 1000 euros. Peut se vendre en direct ou via un appel.
High ticket : offre a plus de 1000 euros, vendue principalement via un appel avec un closer.
Closer : personne chargee de conclure la vente lors d'un appel telephonique ou visio sur des offres high ticket. Son taux de closing a un impact direct sur la rentabilite des campagnes.
Appel decouverte / Call : rdv telephonique avec un closer pour qualifier le besoin et presenter l'offre. Le taux de closing de ces appels a un impact direct sur la rentabilite.
Taux de closing : pourcentage de prospects qui deviennent clients apres un appel. Exemple : 10 appels, 2 ventes = 20%. Ce chiffre n'est pas dans ton controle mais tu dois le connaitre.
Infopreneuriat : modele de business base sur la vente de connaissances (formations, coachings, programmes en ligne). Secteur ou les media buyers sont les plus demandes en France.
E-commerce : vente de produits physiques via un site. On suit le CPA et le ROAS plutot que le CPL.
SaaS : logiciel vendu sous forme d'abonnement. L'objectif pub est l'inscription a l'essai gratuit, pas la vente directe.
Business local : entreprise ancree dans une zone geographique. La pub Meta y fonctionne avec un ciblage geographique precis.
Make money : categorie d'offres qui promettent d'aider a generer des revenus. Niche competitive avec des regles publicitaires strictes chez Meta.

META ADS — MECANIQUE & STRUCTURE :
Ad account / Compte publicitaire : compte Meta dans lequel sont creees et facturees toutes les campagnes. Chaque client a le sien. Tu y es ajoutee en tant que partenaire.
Business Manager (BM) / Portefeuille Business : interface Meta qui centralise les comptes pub, pages Facebook, comptes Instagram, pixels et acces. C'est depuis la que tu geres tout.
Structure d'une campagne Meta : trois niveaux imbriques. Campagne (objectif), Ad set (budget et audience), Publicite/Ad/Creative (ce que voit l'utilisateur).
CBO (Campaign Budget Optimization) : budget defini au niveau de la campagne. Meta repartit automatiquement entre les ad sets selon les performances. Format de reference.
ABO (Ad Set Budget Optimization) : budget fixe au niveau de chaque ad set. Utile uniquement pour tester des creatives tres specifiques.
Objectif de campagne : ce que tu demandes a Meta d'optimiser. Leads pour recuperer des contacts, Ventes pour declencher des achats, Trafic pour amener des visites.
Phase d'apprentissage (Learning phase) : periode ou Meta collecte des donnees pour comprendre a qui montrer la pub. Besoin d'au moins 50 evenements sur 7 jours. Ne pas toucher a la campagne pendant cette phase.
Advantage+ (campagnes automatisees) : format Meta qui automatise une grande partie du ciblage et des creatives. Peut performer tres fort mais demande de bonnes creatives et une bonne comprehension des chiffres.
Testing : phase de test structuree pour identifier quelles creatives, angles et messages fonctionnent avant d'augmenter les budgets. On suit un protocole precis.
Winner / Creative gagnante : publicite qui performe nettement mieux que les autres sur la duree (CTR eleve, CPL bas). Quand on en trouve une, on la scale.
Scaling : augmentation du budget sur ce qui fonctionne. Scaling vertical : augmenter le budget par paliers de 20% max tous les 3 jours. Scaling horizontal : dupliquer la campagne gagnante dans une nouvelle campagne avec un budget plus eleve des le depart. Le horizontal est a privilegier pour augmenter les volumes sans destabiliser ce qui tourne.
Ad fatigue / Fatigue publicitaire : baisse de performance due a une surexposition des creatives. Les chiffres se degradent meme si tu ne changes rien. Solution : renouveler les creatives regulierement.
Frequence : nombre moyen de fois qu'une meme personne a vu ta pub. Au-dela de 3 a 4, l'audience est saturee.
Monitoring / Pilotage : suivre et analyser les campagnes regulierement pour prendre les bonnes decisions. C'est la que se fait la vraie valeur du media buyer.

AUDIENCES & CIBLAGE :
Audience froide / Trafic froid : personnes qui ne connaissent pas encore l'entreprise. Campagnes d'acquisition.
Audience chaude / Trafic chaud : personnes qui ont deja interagi avec l'entreprise. On les cible en retargeting.
Broad (ciblage large) : aucun ciblage par interets. On laisse l'algorithme Meta apprendre et cibler en autonomie. C'est le format qui fonctionne le mieux aujourd'hui sur la plupart des comptes, a condition d'avoir de bonnes creatives.
Ciblage par interets : on indique a Meta des centres d'interet lies a l'audience cible. Fonctionne encore mais uniquement sur des interets tres larges.
Audience personnalisee : audience creee a partir de donnees existantes (visiteurs du site, abonnes Instagram, liste emails clients). Basee sur des comportements reels.
Lookalike (LLA) : audience que Meta construit a partir d'une audience source (ex : tes clients actuels). Plus le pourcentage est bas (1%), plus la similarite est forte.
Retargeting : campagnes qui ciblent les personnes ayant deja interagi sans avoir converti. Le message change : on rassure, on leve les objections, on cree l'urgence.
TOF (Top of Funnel) : haut du tunnel. La personne ne connait pas encore l'entreprise. Objectif : capter l'attention.
MOF (Middle of Funnel) : milieu du tunnel. La personne est curieuse mais pas convaincue. Objectif : eduquer, rassurer.
BOF (Bottom of Funnel) : bas du tunnel. La personne est proche de la decision. Objectif : convertir via du retargeting, preuve sociale ou offre claire.

TRACKING :
Pixel Meta : code installe sur le site ou funnel du client qui envoie des donnees a Meta en temps reel (visites, leads, achats). Point de depart du tracking.
Conversions API (CAPI) : complement au pixel qui envoie les donnees directement depuis le serveur du client vers Meta. Plus fiable, moins sensible aux bloqueurs de pubs.
Evenement pixel : action precise trackee par le pixel (ViewContent, Lead, Purchase). On configure les evenements en amont. Sans ca, Meta ne sait pas quoi optimiser.
UTM : parametres ajoutes a une URL pour identifier l'origine d'un clic (quelle campagne, quel ad set, quelle pub). Permet de croiser les donnees Meta avec celles du CRM ou de Google Analytics.
Logiciel d'attribution : outil pour analyser d'ou viennent reellement les leads et les ventes en croisant plusieurs sources (pub Meta, email, organique).

CREATIVES, SCRIPTS & COPYWRITING :
Creative : le contenu publicitaire dans sa globalite (video ou image, texte principal, titre, bouton d'action). Ce que voit l'utilisateur dans son fil d'actualite.
Ad copy / Texte publicitaire : le texte qui accompagne la creative dans la pub. Il complete l'accroche visuelle, developpe le message et pousse au clic.
Hook : les 3 premieres secondes d'une video, ou la premiere ligne d'un texte. Son seul role : arreter le scroll. Si le hook ne fonctionne pas, personne ne voit le reste.
Angle marketing : le prisme par lequel on aborde le message. Un meme produit peut etre vendu sous l'angle de la peur (ce que tu perds), du desir (ce que tu gagnes), d'une objection (pourquoi tu penses que ca ne marchera pas), ou d'une preuve (ce que d'autres ont obtenu). Changer l'angle relance souvent une campagne qui s'essouffle.
Script publicitaire : la trame ecrite d'une video publicitaire, ligne par ligne. Il structure le hook, le corps du message et le CTA. C'est le document de base que tu fournis a un createur UGC ou a un monteur.
CTA (Call To Action) / Appel a l'action : l'invitation a agir a la fin de la pub. Simple, clair, une seule action demandee.
UGC (User Generated Content) : format video qui ressemble a du contenu naturel filme par un particulier. Tres efficace parce qu'il s'integre dans le fil d'actualite sans friction.
Social proof / Preuve sociale : tout ce qui montre que d'autres personnes ont deja achete, teste ou recommande l'offre. Temoignages, avis, resultats clients. Un des leviers les plus puissants en publicite.
Statique / Visuel : publicite sous forme d'image fixe. Plus rapide a produire, utile pour certains types de messages ou de tests rapides.
Format video : le format dominant sur Meta, en particulier en Stories et Reels. Une video capte mieux l'attention qu'une image.

BRIEF VIDEO & MONTAGE :
Brief creatif : document que tu envoies au createur ou au monteur. Il contient le script, les references visuelles, le ton attendu, les sous-titres, les elements a mettre en avant et ce qui est interdit.
Rushs : les videos brutes, non montees, enregistrees par le createur UGC ou filmees lors d'un tournage.
B-roll : plans de complement utilises en montage pour illustrer ce qui est dit en voix-off ou par le personnage principal.
Plan de coupe : plan court insere entre deux sequences pour assurer la fluidite du montage.
Motion design : animations graphiques integrees a la video (texte anime, chiffres qui apparaissent, transitions stylisees).
Sous-titres : texte affiche a l'ecran pendant que la personne parle. Indispensable sur Meta car la majorite des videos est regardee sans son.

METRICS & PERFORMANCE :
KPI / Indicateurs de performance : indicateurs que le client suit en priorite. Varie selon son business : CPL pour un infopreneur, CPA pour un e-commercant, CPCall pour un high ticket. A clarifier des le debut de la collaboration.
Impressions : nombre total de fois ou la publicite a ete affichee.
Reach / Couverture : nombre de personnes uniques qui ont vu la pub au moins une fois. Different des impressions.
CTR (Click Through Rate) / Taux de clic : pourcentage de personnes qui ont clique sur la pub parmi celles qui l'ont vue. Indicateur principal de l'attractivite de la creative. Un CTR faible = le message n'accroche pas.
CPM (Cout Pour Mille impressions) : ce que tu paies pour que ta pub soit affichee 1000 fois. Varie selon la periode, la concurrence sur l'audience et la qualite de la creative. Un CPM eleve seul n'est pas un probleme, c'est le CPL qui dit si c'est rentable ou non.
CPC (Cout Par Clic) : ce que coute chaque clic sur la publicite. Utile pour comparer des creatives entre elles, mais pas suffisant seul pour juger une campagne.
CPL (Cout Par Lead) : ce que coute chaque lead genere. C'est le chiffre que ton client surveille le plus en generation de leads. Exemple : 500 euros depenses pour 50 leads = CPL de 10 euros.
CPA (Cout Par Acquisition) : ce que coute chaque vente generee. Utilise principalement en e-commerce ou quand la vente se fait en ligne directement.
CPCall (Cout Par Call) : ce que coute chaque appel decouverte genere. Indicateur cle sur les offres high ticket ou la conversion passe par un appel.
ROAS (Return On Ad Spend) : revenus generes divises par le budget pub depense. Exemple : 3000 euros investis, 12000 euros de revenus = ROAS de 4. C'est LE chiffre que regarde un entrepreneur en premier. En dessous de 2, il y a un probleme. Au-dessus de 3, on alimente la machine.
ROI (Return On Investment) : retour sur investissement global (publicite + toutes les autres depenses). Plus large que le ROAS.
Taux de conversion : pourcentage de visiteurs qui realisent l'action attendue sur une page. Si le trafic est la mais que le taux de conversion est faible, le probleme vient de la page, pas de la pub.
Spend / Montant depense : montant que l'entrepreneur a depense en publicite. Tu le trouves dans le gestionnaire de publicites.

IA & OUTILS :
IA generative : ensemble d'outils qui generent du contenu a partir de consignes. En media buying, l'IA est utilisee quotidiennement pour produire des scripts, des hooks, des variations de creatives et des angles marketing. C'est un levier de productivite direct.
Prompt : la consigne que tu donnes a un outil IA pour obtenir un resultat. Plus le prompt est precis (contexte, cible, ton, format attendu), meilleur est le resultat.
Ads Manager : interface Meta dans laquelle tu crees, geres et analyses toutes les campagnes publicitaires. Ton outil de travail principal au quotidien.

ACTIVITE FREELANCE & RELATION CLIENT :
Freelance : statut de travailleur independant qui realise des missions pour plusieurs clients. En France, la micro-entreprise est la structure la plus courante pour demarrer.
Micro-entreprise / Auto-entrepreneur : statut juridique simplifie. Creation rapide, comptabilite allegee, charges calculees sur le chiffre d'affaires reel.
Retainer / Forfait mensuel : remuneration fixe versee chaque mois par le client en echange d'une prestation continue. Viser des revenus previsibles avec un perimetre d'intervention clair et des livrables definis.
Onboarding : processus d'integration d'un nouveau client (premiers echanges, recuperation des acces, cadrage des objectifs et du mode de communication). Un bon onboarding evite 80% des frictions.
Brief client : document dans lequel le client decrit ses attentes, son offre, sa cible, ses resultats passes et ses objectifs. C'est la base sur laquelle tu construis ta strategie.
Appel decouverte (prospection) : premier appel avec un prospect pour comprendre sa situation, ses besoins et voir si une collaboration est envisageable. Ce n'est pas un appel de vente, c'est un entretien qualifie.
Proposition commerciale : document que tu envoies apres l'appel decouverte. Il presente ta comprehension de la situation, ce que tu proposes, le perimetre d'intervention et le tarif. Pas de devis brut, une vraie proposition construite sur ce que le client t'a dit.
Contrat de prestation : document legal qui formalise la collaboration (duree, prestations incluses, tarif, conditions de paiement, clause de resiliation). Indispensable avec chaque client.
Reporting : document ou presentation que tu envoies regulierement a ton client pour expliquer les performances de ses campagnes. Un bon reporting donne confiance et justifie ta valeur.
Acces partenaire : mode d'acces au compte publicitaire d'un client via le Business Manager. Tu es ajoutee en tant que partenaire, jamais en tant qu'administratrice principale.
Scope / Perimetre d'intervention : ce qui est inclus dans ta prestation et ce qui ne l'est pas. Defini dans le contrat.
Audit publicitaire : analyse des campagnes existantes d'un prospect ou client pour identifier ce qui fonctionne et ce qui pourrait etre ameliore. C'est souvent le point de depart d'une proposition commerciale.

KPIs MEDIA BUYER — BENCHMARKS LEADGEN WEBINAIRE 2026 (Marche France, Infopreneurs & Webinaires, Meta Ads) :
Ces benchmarks sont adaptes au marche France (Tier 2). Les normes varient selon la niche, l'audience et la qualite de la creative.

COUT & VISIBILITE :
CPM (Cout pour mille impressions) — Formule : Depenses / Impressions x 1000. Bon : < 8 EUR. Correct : 8-15 EUR. Preoccupant : > 20 EUR. Un CPM eleve + CTR faible = la creative ne stoppe pas le scroll. Un bon hook rate reduit le CPM sur la duree car l'algo recompense les pubs qui retiennent l'attention.
CPC lien (Cout par clic vers la landing) — Formule : Depenses / Clics sur lien. Bon : < 0,80 EUR. Correct : 0,80-1,50 EUR. Preoccupant : > 2 EUR. Si CPC correct mais CPL eleve : le probleme vient de la page, pas de la pub. Argument cle pour cadrer ta responsabilite avec le client.
CTR (Taux de clic sur le lien) — Formule : Clics lien / Impressions x 100. Bon : > 2%. Correct : 1-2%. Preoccupant : < 1%. Moyenne leadgen Meta 2026 : environ 2,5%. En dessous de 1% : probleme de corps de pub ou d'appel a l'action. Ne pas confondre avec le CTR tous clics (inclut clics profil).

ENGAGEMENT CREATIF :
Hook Rate (Taux d'accroche) — Formule : Vues 3 sec / Impressions x 100. Bon : > 30%. Correct : 20-30%. Preoccupant : < 15%. Mesure uniquement les 3 premieres secondes. Si faible : changer le visuel d'ouverture ou la premiere phrase. Un hook fort reduit le CPM car l'algo distribue plus la pub. Metrique personnalisee a creer dans Ads Manager.
Hold Rate (Taux de retention) — Formule : ThruPlays / Vues 3 sec x 100. Bon : > 40%. Correct : 25-40%. Preoccupant : < 20%. Hook fort + Hold faible = la pub ne delivre pas sa promesse. Probleme de corps du script, pas du hook. Les deux metriques se lisent ensemble. Metrique personnalisee a creer dans Ads Manager.

CONVERSION :
Taux d'optin (Taux de conversion landing page) — Formule : Inscrits / Clics lien x 100. Bon : > 35%. Correct : 20-35%. Preoccupant : < 15%. La seule metrique qui dit si le probleme vient de la pub ou de la page. CTR bon + optin faible = page en cause, pas toi. Necessite un evenement de conversion configure. Metrique personnalisee.
CPL (Cout par lead / par inscrit) — Formule : Depenses / Nombre d'inscrits. Bon : < 5 EUR. Correct : 5-12 EUR. Preoccupant : > 15 EUR. Chiffre cle a remonter au client. En France, webinaire performant : 2 a 8 EUR. Au-dela de 15 EUR, l'economie se deteriore. Resultat combine de CPM + CTR + taux d'optin.
CPA (Cout par acquisition) — Formule : Depenses / Nombre d'achats. Bon : < 20 EUR. Correct : 20-50 EUR. Preoccupant : > 80 EUR. Pertinent pour l'e-commerce ou la vente directe. Pour les infopreneurs webinaire + appel decouverte : le CPL prime, le CPA est difficilement tracable car la vente se fait hors Meta.

RENTABILITE :
ROAS (Retour sur investissement pub) — Formule : Revenus generes / Depenses pub. Bon : > 4. Correct : 2-4. Preoccupant : < 2. Le premier chiffre que le client regarde. Calculer le seuil de rentabilite avec lui a l'onboarding. En dessous de 2 : la machine coute plus qu'elle ne rapporte. ROAS > 4 tres atteignable sur webinaire.

UGC — SCRIPTS & BRIEFS :
L'UGC (User Generated Content) = videos qui ressemblent a du contenu organique, filmees par une vraie personne, utilisees comme publicite. Le CTR est souvent 2x a 5x plus eleve qu'une pub classique. Moins cher a produire qu'une pub studio.

Structure d'une video UGC qui convertit : Hook (0-3 sec) capter l'attention, stopper le scroll. Probleme (3-10 sec) creer de l'identification. Solution (10-25 sec) presenter le produit ou service. Preuve (25-35 sec) temoignage, resultat, chiffre. CTA (35-40 sec) action claire et simple. Regle d'or : les 3 premieres secondes font tout. Si le hook est faible, personne ne voit la suite.

Types de hooks qui fonctionnent :
Hooks question : "Tu te reconnais dans ce scenario ?", "Combien de fois tu as dit demain je commence ?", "Est-ce que toi aussi tu fais cette erreur ?"
Hooks affirmation choc : "J'ai gagne [chiffre] EUR depuis mon canape ce mois-ci", "On m'a menti sur [sujet]", "Ce truc que tu fais tous les jours te coute de l'argent"
Hooks POV : "POV : tu viens de quitter ton CDI apres 8 ans", "POV : tu travailles depuis un cafe un mardi matin", "POV : tu recois un virement alors que tu dormais"
Hooks pattern interrupt (visuel) : debuter avec une action inattendue, texte overlay qui intrigue avant que la personne parle, question ecrite a l'ecran pendant 2 secondes.

Template brief creator UGC : L'offre (decrire le produit en 1-2 phrases). La cible (qui regarde, sa douleur principale). L'objectif de la video (faire cliquer, s'inscrire, acheter). Hook a utiliser (mot pour mot). Corps du message (script ou grandes lignes). CTA final. Format vertical 9:16, duree 30 a 60 secondes. Style (selfie naturel, b-roll, studio). Ton (decontracte, professionnel, emotionnel). A eviter (concurrents, jargon). Inspirations (lien ou description d'une pub de reference).

Scripts Melissa (exemples a adapter) :
Script type 1 — Storytelling reconversion : format selfie, peu de coupes, musique inspirante. Hook : "Il y a deux ans... je me couchais a 8h du matin en revenant d'une garde de nuit." Corps : raconter le moment declencheur, la decouverte du metier, les premiers resultats. CTA : renvoyer vers un live gratuit.
Script type 2 — Format POV / ambiance : se filmer dans un cafe ou a la maison, format storytime decontracte. Hook : "La il est 14h un mardi. Je bois mon cafe. J'ai aucune alarme. J'ai aucun chef." Corps : situation d'avant vs maintenant, introduire le metier naturellement. CTA : renvoyer vers un evenement live gratuit.
Script type 3 — Format podcast (2 personnes) : une intervieweuse et Melissa dans un studio. Hook intervieweuse : "Melissa, tu etais infirmiere depuis 8 ans, tu es tombee enceinte, et tu as completement change de metier..." Corps : format questions / reponses naturel. CTA : renvoyer vers une masterclass gratuite.
Script type 4 — Format "mes pensees en direct" (voix off) : voix off qui agit comme les pensees, filmer le b-roll d'abord. Hook : "Ok... alors comment je leur dis ca." Corps : monologue interieur qui explique le metier naturellement, avec des doutes authentiques. CTA : renvoyer vers un live gratuit.

7 angles UGC a tester : Avant/Apres ("Avant j'avais [probleme]. Maintenant j'ai [resultat]."), Erreur courante ("L'erreur que 90% des gens font avec [sujet]"), Chiffre choc ("J'ai genere [X EUR] avec ce seul trick"), Inattendu ("Je pensais que c'etait une arnaque. Je me suis trompee."), Identification ("Si toi aussi tu [situation cible], cette video est pour toi"), POV ("POV : tu decouvres [produit] pour la premiere fois"), Temoignage ("Je vais vous montrer exactement ce qui m'a change la vie").

DIAGNOSTIC RAPIDE — COMMENT LIRE UN COMPTE :
CTR < 1% : creative faible, changer le hook ou le visuel. Hook Rate < 15% : les 3 premieres secondes n'accrochent pas, reecrire l'ouverture. Hook fort + Hold faible : le corps du script decoit, retravailler le corps pas le hook. CTR correct + CPL eleve : landing page sous-performante, optimiser la page d'optin. CPM tres eleve : audience trop petite ou trop concurrentielle, elargir l'audience. ROAS < 2 : probleme d'offre ou de funnel, audit complet du tunnel de vente.

QUAND COUPER UNE CAMPAGNE :
CPL > 3x l'objectif apres 7 jours : couper. CTR < 0.5% apres 3 jours et 1000 impressions : couper la creative. 0 resultat apres 50 EUR depenses : revoir la creative ou l'audience. Performances en baisse depuis 5+ jours : rafraichir les creatives.

STRUCTURE D'UNE CAMPAGNE META ADS :
Trois niveaux imbriques. CAMPAGNE : definit l'objectif (Leads, Traffic, Ventes) et le budget en CBO (budget au niveau campagne). ADSET (Ensemble de publicites) : definit l'audience (interets, lookalike, broad), les placements (auto ou manuel), et le budget en ABO (budget au niveau adset). AD (Publicite) : la creative (video ou image), le texte (accroche + corps + CTA), l'URL de destination.

PHASE DE TEST — COMMENT BIEN TESTER :
Regle d'or : tester une variable a la fois. Etape 1 — Tester les creatives : lancer 3 a 5 creatives differentes dans le meme adset, meme audience, meme budget, laisser tourner 3 a 7 jours minimum, identifier la creative winner (meilleur CTR + CPL). Etape 2 — Tester les audiences : garder la creative winner, tester 2-3 audiences differentes, comparer les CPL. Etape 3 — Scaler ce qui marche : augmenter le budget progressivement (+20% max tous les 2-3 jours), ne pas toucher une campagne qui performe bien.

LES 7 ERREURS CLASSIQUES DES DEBUTANTES :
1. Couper les campagnes trop tot : l'algorithme a besoin de temps (phase d'apprentissage = 50 conversions min). 2. Trop toucher aux campagnes : chaque modification redemarre la phase d'apprentissage. 3. Tester trop de choses en meme temps : impossible d'identifier ce qui marche. 4. Ignorer le pixel : sans evenements, Meta n'optimise pas. 5. Audiences trop petites : en dessous de 500 000 personnes, le CPM explose. 6. Negliger le hook : 80% des resultats viennent des 3 premieres secondes. 7. Ne pas reporter au client : un client sans infos est un client qui part.

INTRODUCTION AU RETARGETING :
Le retargeting = montrer une pub aux gens qui ont deja interagi avec le client. Audiences chaudes a cibler : visiteurs du site (90 derniers jours), personnes ayant regarde 50%+ d'une video, personnes ayant interagi avec la page FB / compte IG, abonnes a la newsletter (liste importee). Quand utiliser le retargeting : quand le client a du trafic (minimum 1000 visiteurs/mois), pour relancer les prospects qui n'ont pas converti. Budget separe de la prospection (20-30% du budget total).

TARIFS MEDIA BUYER FREELANCE :
Debutante (0-3 mois) : 500 a 1000 EUR par mois par client. Intermediaire (3-12 mois) : 1000 a 2500 EUR. Confirmee (12+ mois) : 2500 a 5000 EUR+. Regles de base : ne jamais descendre en dessous de 500 EUR/mois, toujours facturer un forfait mensuel fixe (pas a l'heure), augmenter ses prix tous les 3-6 mois, facturer separement le setup (mise en place) : 300-500 EUR une fois.

METHODE REPORTING HEBDOMADAIRE :
Chaque semaine, envoyer au client un message simple : "Bonjour [Prenom], voici le point de la semaine : Budget depense : ___EUR. Leads generes : ___. CPL moyen : ___EUR. Action de la semaine prochaine : [optimisation prevue]. N'hesite pas si tu as des questions. [Ton prenom]". Un client qui recoit un rapport chaque semaine ne part jamais.`;

function addMsg(text, who) {
  const div = document.createElement("div");
  div.className = "msg " + who;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

addMsg("Salut. Pose-moi ta question sur Meta Ads, le copywriting, tes campagnes ou ton activite freelance. Je suis la pour te debloquer.", "bot");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  addMsg(text, "user");
  history.push({ role: "user", content: text });
  input.value = "";
  send.disabled = true;
  const loading = addMsg("Melissa reflechit...", "bot loading");

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ system: SYSTEM, messages: history })
    });
    const data = await res.json();
    const reply = data.reply || "Erreur de connexion. Reessaie.";
    loading.remove();
    addMsg(reply, "bot");
    history.push({ role: "assistant", content: reply });
  } catch (err) {
    loading.remove();
    addMsg("Erreur technique. Verifie ta connexion ou reessaie dans un instant.", "bot");
  }
  send.disabled = false;
  input.focus();
});
</script>
